name: Deploy to WordPress.org on: release: types: - released permissions: contents: write jobs: deploy: name: Deploy plugin to WordPress.org runs-on: ubuntu-latest steps: - name: Check out release uses: actions/checkout@v4 - name: Deploy to WordPress.org id: deploy uses: 10up/action-wordpress-plugin-deploy@stable with: generate-zip: true env: SVN_USERNAME: ${{ secrets.SVN_USERNAME }} SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }} SLUG: mailhilfe-order-note-manager - name: Upload installable ZIP to GitHub release uses: softprops/action-gh-release@v2 with: files: ${{ steps.deploy.outputs.zip-path }} env: GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
